<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stockfish in the Browser</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
<style>
  body {
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 24px;
    background: #f4f4f4;
    transition: background 0.4s ease;
  }
  #board { width: 400px; min-height: 400px; }
  #status { font-size: 15px; color: #333; }
  #controls { display: flex; gap: 12px; align-items: center; }
  button, select { padding: 8px 16px; font-size: 14px; cursor: pointer; border-radius: 6px; border: 1px solid #ccc; }

  /* ---- HIGH graphics mode flourishes ---- */
  body.gfx-high {
    background: radial-gradient(circle at top, #2b2b3d, #14141f);
  }
  body.gfx-high #status { color: #eee; }
  body.gfx-high #board {
    box-shadow: 0 0 40px rgba(0,0,0,0.6), 0 0 0 6px #1a1a2e;
    border-radius: 6px;
  }
  body.gfx-high .white-1e1d7 { background: #eae0c8 !important; }
  body.gfx-high .black-3c85d { background: #6d5b8a !important; }
  body.gfx-high img.piece-417db {
    filter: drop-shadow(0 3px 4px rgba(0,0,0,0.5));
  }
  body.gfx-high .highlight1-32417, body.gfx-high .highlight2-9c5d2 {
    box-shadow: inset 0 0 0 4px rgba(255, 215, 0, 0.8) !important;
  }
</style>
</head>
<body>

<h2>Play Stockfish (runs entirely in your browser)</h2>

<div id="controls">
  <label for="gfxSelect">Graphics:</label>
  <select id="gfxSelect">
    <option value="low">Low</option>
    <option value="normal" selected>Normal</option>
    <option value="high">High</option>
  </select>
  <button id="newGameBtn">New Game</button>
</div>

<div id="board"></div>
<div id="status">Loading engine...</div>

<script>
  const game = new Chess();
  const engine = new Worker("stockfish-18-lite-single.js");
  const statusEl = document.getElementById("status");
  const gfxSelect = document.getElementById("gfxSelect");
  let engineReady = false;
  let board = null;

  // Graphics presets: piece set + animation speeds
  const GFX_PRESETS = {
    low: {
      pieceTheme: "https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/img/chesspieces/wikipedia/{piece}.png",
      moveSpeed: 0,      // instant, no sliding animation
      appearSpeed: 0,
      snapbackSpeed: 0,
      snapSpeed: 0
    },
    normal: {
      pieceTheme: "https://lichess1.org/assets/piece/merida/{piece}.svg",
      moveSpeed: 200,    // smooth sliding
      appearSpeed: 200,
      snapbackSpeed: 150,
      snapSpeed: 100
    },
    high: {
      pieceTheme: "https://lichess1.org/assets/piece/alpha/{piece}.svg",
      moveSpeed: 350,    // slower, more dramatic slide
      appearSpeed: 300,
      snapbackSpeed: 250,
      snapSpeed: 150
    }
  };

  function buildBoard(gfxMode) {
    const preset = GFX_PRESETS[gfxMode];
    const currentFen = game.fen();

    document.body.classList.remove("gfx-low", "gfx-normal", "gfx-high");
    document.body.classList.add("gfx-" + gfxMode);

    if (board) {
      board.destroy();
    }

    board = Chessboard("board", {
      draggable: true,
      position: currentFen,
      onDrop: onDrop,
      pieceTheme: preset.pieceTheme,
      moveSpeed: preset.moveSpeed,
      appearSpeed: preset.appearSpeed,
      snapbackSpeed: preset.snapbackSpeed,
      snapSpeed: preset.snapSpeed
    });
  }

  engine.onmessage = function (e) {
    const line = typeof e.data === "string" ? e.data : e.data.data;

    if (line === "uciok") {
      engine.postMessage("isready");
    } else if (line === "readyok") {
      engineReady = true;
      statusEl.textContent = "Engine ready. Your move (white).";
    } else if (line.startsWith("bestmove")) {
      const move = line.split(" ")[1];
      if (move && move !== "(none)") {
        game.move({ from: move.slice(0, 2), to: move.slice(2, 4), promotion: move[4] || "q" });
        board.position(game.fen());
      }
      statusEl.textContent = game.game_over() ? "Game over." : "Your move.";
    }
  };

  engine.postMessage("uci");

  function onDrop(source, target) {
    const move = game.move({ from: source, to: target, promotion: "q" });
    if (move === null) return "snapback";

    statusEl.textContent = "Engine thinking...";
    engine.postMessage("position fen " + game.fen());
    engine.postMessage("go depth 15");
  }

  gfxSelect.addEventListener("change", function () {
    buildBoard(gfxSelect.value);
  });

  document.getElementById("newGameBtn").onclick = function () {
    game.reset();
    board.position("start");
    statusEl.textContent = "New game. Your move (white).";
  };

  // initial build
  buildBoard(gfxSelect.value);
</script>

</body>
</html>
